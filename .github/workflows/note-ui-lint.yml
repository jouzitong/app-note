name: note-ui ci

on:
  push:
    paths:
      - 'note-ui/**'
      - '.github/workflows/note-ui-lint.yml'
  pull_request:
    paths:
      - 'note-ui/**'
      - '.github/workflows/note-ui-lint.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: note-ui
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: note-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint:ci

      - name: Run unit tests
        run: npm run test:unit
