<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>我的 - 静态参考页</title>
  <style>
    :root {
      --bg: #f3f6fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --brand: #2563eb;
      --ok: #059669;
      --warn: #d97706;
      --danger: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      height: 100vh;
      height: 100dvh;
      min-height: -webkit-fill-available;
      overflow: hidden;
      background:
        radial-gradient(circle at 0 0, #dbeafe 0, transparent 34%),
        radial-gradient(circle at 100% 100%, #e0f2fe 0, transparent 38%),
        var(--bg);
    }

    .content {
      height: calc(100vh - 72px - env(safe-area-inset-bottom));
      height: calc(100dvh - 72px - env(safe-area-inset-bottom));
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding: calc(14px + env(safe-area-inset-top)) 12px calc(16px + env(safe-area-inset-bottom));
    }

    .hero {
      border-radius: 16px;
      padding: 16px;
      background: linear-gradient(135deg, #1d4ed8, #0ea5e9);
      color: #fff;
      margin-bottom: 12px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.14);
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .avatar {
      width: 52px;
      height: 52px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.22);
      display: grid;
      place-items: center;
      font-weight: 700;
      font-size: 20px;
      border: 1px solid rgba(255, 255, 255, 0.36);
    }

    .name {
      font-size: 18px;
      font-weight: 700;
      margin: 0;
    }

    .sub {
      margin: 4px 0 0;
      opacity: 0.92;
      font-size: 12px;
    }

    .chip-row {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.25);
      white-space: nowrap;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
    }

    .card h2 {
      margin: 0 0 10px;
      font-size: 16px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .stat {
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 10px;
      background: #f8fafc;
      text-align: center;
    }

    .stat .v {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .stat .k {
      font-size: 11px;
      color: var(--muted);
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 11px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
    }

    .item .left {
      min-width: 0;
    }

    .item .t {
      font-size: 13px;
      font-weight: 600;
      margin: 0;
    }

    .item .d {
      margin-top: 2px;
      font-size: 11px;
      color: var(--muted);
    }

    .tag {
      font-size: 11px;
      border-radius: 999px;
      padding: 4px 8px;
      white-space: nowrap;
      background: #f3f4f6;
      color: #4b5563;
    }

    .tag.ok { background: #ecfdf5; color: var(--ok); }
    .tag.warn { background: #fffbeb; color: var(--warn); }
    .tag.danger { background: #fef2f2; color: var(--danger); }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .btn {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
      text-align: left;
    }

    .btn.primary {
      border-color: #bfdbfe;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
    }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: calc(72px + env(safe-area-inset-bottom));
      padding-bottom: env(safe-area-inset-bottom);
      background: #fff;
      border-top: 1px solid var(--line);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      z-index: 10;
      transform: translateZ(0);
    }

    .nav-item {
      border: 0;
      background: transparent;
      display: grid;
      justify-items: center;
      align-content: center;
      gap: 4px;
      color: var(--muted);
      font-size: 11px;
    }

    .nav-item .icon { font-size: 16px; line-height: 1; }
    .nav-item.active { color: var(--brand); }

    @media (min-width: 768px) {
      .app {
        max-width: 430px;
        margin: 0 auto;
        border-left: 1px solid var(--line);
        border-right: 1px solid var(--line);
      }

      .bottom-nav {
        max-width: 430px;
        left: 50%;
        transform: translateX(-50%) translateZ(0);
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <main class="content">
      <section class="hero">
        <div class="profile">
          <div class="avatar">周</div>
          <div>
            <p class="name">周同学</p>
            <p class="sub">连续学习 18 天 · JLPT N3 目标进行中</p>
          </div>
        </div>
        <div class="chip-row">
          <span class="chip">今日学习 72 分钟</span>
          <span class="chip">本周完成率 86%</span>
          <span class="chip">错词回顾 12 条</span>
        </div>
      </section>

      <section class="card">
        <h2>学习资产</h2>
        <div class="stats">
          <div class="stat">
            <div class="v">3250</div>
            <div class="k">累计词汇</div>
          </div>
          <div class="stat">
            <div class="v">148</div>
            <div class="k">笔记条数</div>
          </div>
          <div class="stat">
            <div class="v">91%</div>
            <div class="k">近7天正确率</div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>账号与订阅</h2>
        <div class="list">
          <div class="item">
            <div class="left">
              <p class="t">会员状态</p>
              <div class="d">到期时间：2026-12-31</div>
            </div>
            <span class="tag ok">有效</span>
          </div>
          <div class="item">
            <div class="left">
              <p class="t">同步状态</p>
              <div class="d">最近同步：今天 08:12</div>
            </div>
            <span class="tag ok">正常</span>
          </div>
          <div class="item">
            <div class="left">
              <p class="t">提醒设置</p>
              <div class="d">每日 08:00 / 21:00 推送</div>
            </div>
            <span class="tag warn">已开启</span>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>快捷操作</h2>
        <div class="actions">
          <button class="btn primary">编辑个人资料</button>
          <button class="btn">学习偏好设置</button>
          <button class="btn">导出学习报告</button>
          <button class="btn">退出登录</button>
        </div>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="nav-item"><span class="icon">⌂</span><span>首页</span></button>
      <button class="nav-item"><span class="icon">▦</span><span>课程</span></button>
      <button class="nav-item"><span class="icon">◷</span><span>计划</span></button>
      <button class="nav-item active"><span class="icon">◉</span><span>我的</span></button>
    </nav>
  </div>
</body>
</html>
